<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratar - PedidoFácil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e67e22, #d35400);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 48px;
        }
        .logo h2 {
            font-size: 28px;
            margin-top: 10px;
            color: #1a1a2e;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #e67e22;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230,126,34,0.3);
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        small {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="logo">
            <div class="logo-icon">🍽️</div>
            <h2>Pedido<span style="color:#e67e22">Fácil</span></h2>
            <p>Preencha os campos para contratar</p>
        </div>
        
        <form id="formContratar">
            <div class="form-group">
                <label>Seu nome completo *</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>
            
            <div class="form-group">
                <label>Seu melhor e-mail *</label>
                <input type="email" id="email" placeholder="contato@seudominio.com" required>
            </div>
            
            <div class="form-group">
                <label>Seu WhatsApp *</label>
                <input type="tel" id="whatsapp" placeholder="(11) 99999-9999" required>
            </div>
            
            <div class="form-group">
                <label>Nome da sua loja *</label>
                <input type="text" id="loja" placeholder="Ex: Lanches do Airton" required>
            </div>
            
            <div class="form-group">
                <label>Senha *</label>
                <input type="password" id="senha" placeholder="Crie uma senha (mínimo 6 caracteres)" required>
            </div>
            
            <div class="form-group">
                <label>Quantos pedidos você recebe por dia? *</label>
                <div class="radio-group">
                    <label><input type="radio" name="pedidos" value="Menos de 10"> Menos de 10</label>
                    <label><input type="radio" name="pedidos" value="Mais de 10"> Mais de 10</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Você possui um Computador ou Notebook? *</label>
                <div class="radio-group">
                    <label><input type="radio" name="computador" value="Sim"> Sim</label>
                    <label><input type="radio" name="computador" value="Não"> Não</label>
                </div>
            </div>
            
            <div class="form-group">
                <label>Qual é o seu faturamento mensal? *</label>
                <select id="faturamento" required>
                    <option value="">Selecione</option>
                    <option>Não inaugurou ainda</option>
                    <option>Até R$10.000</option>
                    <option>De R$10.001 a R$20.000</option>
                    <option>De R$20.001 a R$40.000</option>
                    <option>Acima de R$40.000</option>
                </select>
            </div>
            
            <button type="submit" class="btn-submit">Avançar →</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA8qo7qFYXlqEriMBeyoyELwtiRPGxpVc4",
            authDomain: "lanchepodpah.firebaseapp.com",
            projectId: "lanchepodpah",
            storageBucket: "lanchepodpah.firebasestorage.app",
            messagingSenderId: "451860544292",
            appId: "1:451860544292:web:4dbbe9c0c53e8cd0cf91b1"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('message');
            msg.textContent = texto;
            msg.style.backgroundColor = tipo === 'success' ? '#27ae60' : '#e74c3c';
            msg.style.color = 'white';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }
        
        document.getElementById('formContratar').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const loja = document.getElementById('loja').value;
            const senha = document.getElementById('senha').value;
            const pedidos = document.querySelector('input[name="pedidos"]:checked')?.value;
            const computador = document.querySelector('input[name="computador"]:checked')?.value;
            const faturamento = document.getElementById('faturamento').value;
            
            if (!pedidos || !computador) {
                mostrarMensagem('Preencha todas as opções', 'error');
                return;
            }
            
            if (senha.length < 6) {
                mostrarMensagem('Senha precisa ter no mínimo 6 caracteres', 'error');
                return;
            }
            
            const plano = localStorage.getItem('planoSelecionado') || 'start';
            
            const dados = {
                nome: loja,
                email: email,
                whatsapp: whatsapp,
                contato: nome,
                pedidos: pedidos,
                computador: computador,
                faturamento: faturamento,
                senha: btoa(senha),
                plano: plano,
                status: 'ativo',
                createdAt: new Date().toISOString()
            };
            
            try {
                await setDoc(doc(db, "restaurantes", email), dados);
                localStorage.setItem('restauranteLogado', JSON.stringify({ email: email, nome: loja, whatsapp: whatsapp }));
                mostrarMensagem('✅ Cadastro realizado! Redirecionando...', 'success');
                setTimeout(() => {
                    window.location.href = 'painel.html';
                }, 2000);
            } catch (error) {
                mostrarMensagem('Erro ao cadastrar. Tente novamente.', 'error');
            }
        });
        
        document.getElementById('whatsapp').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                if (value.length <= 2) e.target.value = `(${value}`;
                else if (value.length <= 6) e.target.value = `(${value.slice(0,2)}) ${value.slice(2)}`;
                else if (value.length <= 10) e.target.value = `(${value.slice(0,2)}) ${value.slice(2,6)}-${value.slice(6)}`;
                else e.target.value = `(${value.slice(0,2)}) ${value.slice(2,7)}-${value.slice(7,11)}`;
            }
        });
    </script>
</body>
</html>
