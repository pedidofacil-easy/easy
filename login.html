<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PedidoFácil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .login-box {
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 64px;
        }
        .logo h2 {
            font-size: 28px;
            margin-top: 12px;
            color: #1a1a2e;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e67e22;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .register-link a {
            color: #e67e22;
            text-decoration: none;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">🍽️</div>
                <h2>Pedido<span style="color:#e67e22">Fácil</span></h2>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email do restaurante" required>
                </div>
                <div class="form-group">
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit">Entrar no sistema →</button>
            </form>
            
            <div class="register-link">
                Não tem conta? <a href="contratar.html">Cadastre-se grátis</a>
            </div>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA8qo7qFYXlqEriMBeyoyELwtiRPGxpVc4",
            authDomain: "lanchepodpah.firebaseapp.com",
            projectId: "lanchepodpah",
            storageBucket: "lanchepodpah.firebasestorage.app",
            messagingSenderId: "451860544292",
            appId: "1:451860544292:web:4dbbe9c0c53e8cd0cf91b1"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        function mostrarMensagem(texto, tipo) {
            const msg = document.getElementById('message');
            msg.textContent = texto;
            msg.style.backgroundColor = tipo === 'success' ? '#27ae60' : '#e74c3c';
            msg.style.color = 'white';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 5000);
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            const restRef = doc(db, "restaurantes", email);
            const docSnap = await getDoc(restRef);
            
            if (docSnap.exists() && docSnap.data().senha === btoa(senha)) {
                const data = docSnap.data();
                localStorage.setItem('restauranteLogado', JSON.stringify({
                    email: email,
                    nome: data.nome,
                    whatsapp: data.whatsapp
                }));
                window.location.href = 'painel.html';
            } else {
                mostrarMensagem('Email ou senha incorretos', 'error');
            }
        });
    </script>
</body>
</html>
