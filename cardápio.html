<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital - PedidoFácil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; padding-bottom: 80px; }
        .header-cardapio { background: linear-gradient(135deg, #e67e22, #d35400); color: white; padding: 40px 20px; text-align: center; }
        .header-cardapio h1 { font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .produto-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .produto-preco { font-size: 18px; font-weight: bold; color: #e67e22; }
        .carrinho { position: fixed; bottom: 20px; right: 20px; background: #e67e22; color: white; padding: 15px 20px; border-radius: 50px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 24px; border-radius: 24px; width: 90%; max-width: 400px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
<div class="header-cardapio"><h1 id="nomeRestaurante">Carregando...</h1></div>
<div class="container" id="cardapioContainer"><div class="loading">⏳ Carregando...</div></div>
<div class="carrinho" onclick="abrirCarrinho()">🛒 <span id="qtdItens">0</span></div>
<div id="modalCarrinho" class="modal"><div class="modal-content"><h3>🛒 Carrinho</h3><div id="carrinhoItens"></div><div style="margin:16px 0; font-weight:bold;">Total: R$ <span id="totalCarrinho">0.00</span></div><div class="form-group"><select id="formaPagamento" style="width:100%; padding:10px; border-radius:12px;"><option>Dinheiro</option><option>PIX</option><option>Cartão</option></select></div><button class="btn-add" onclick="finalizarPedido()">Confirmar pedido</button><button onclick="fecharCarrinho()" style="margin-top:10px; background:#ccc; border:none; padding:10px; border-radius:50px; width:100%;">Fechar</button></div></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, doc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyA8qo7qFYXlqEriMBeyoyELwtiRPGxpVc4", authDomain: "lanchepodpah.firebaseapp.com", projectId: "lanchepodpah", storageBucket: "lanchepodpah.firebasestorage.app", messagingSenderId: "451860544292", appId: "1:451860544292:web:4dbbe9c0c53e8cd0cf91b1" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search); const restauranteEmail = urlParams.get('rest');
    let carrinho = [], produtos = [], dadosRestaurante = {};
    async function carregarDados() {
        if(!restauranteEmail){ document.getElementById('cardapioContainer').innerHTML='<div class="loading">❌ Restaurante não encontrado</div>'; return; }
        const restSnap = await getDoc(doc(db,"restaurantes",restauranteEmail));
        if(!restSnap.exists()){ document.getElementById('cardapioContainer').innerHTML='<div class="loading">❌ Restaurante não encontrado</div>'; return; }
        dadosRestaurante = restSnap.data(); document.getElementById('nomeRestaurante').textContent = dadosRestaurante.nome;
        const snapshot = await getDocs(query(collection(db,"produtos"), where("restauranteId","==",restauranteEmail)));
        produtos = []; snapshot.forEach(d=>produtos.push({id:d.id,...d.data()}));
        const container = document.getElementById('cardapioContainer');
        if(produtos.length===0){ container.innerHTML='<div class="loading">🍽️ Nenhum produto</div>'; return; }
        container.innerHTML = '';
        produtos.forEach(p=>{ container.innerHTML += `<div class="produto-card" onclick="adicionarAoCarrinho('${p.id}')"><div><strong>${p.nome}</strong><br><small>${p.descricao||''}</small></div><div class="produto-preco">R$ ${p.preco.toFixed(2)}</div></div>`; });
    }
    window.adicionarAoCarrinho = (id) => { const p = produtos.find(x=>x.id===id); const existente = carrinho.find(i=>i.id===id); if(existente) existente.qtd++; else carrinho.push({...p,qtd:1}); atualizarCarrinho(); };
    function atualizarCarrinho(){ document.getElementById('qtdItens').textContent = carrinho.reduce((a,i)=>a+i.qtd,0); }
    window.abrirCarrinho = () => { const container = document.getElementById('carrinhoItens'); let total=0; if(carrinho.length===0) container.innerHTML='<p>Carrinho vazio</p>'; else{ container.innerHTML=''; carrinho.forEach(i=>{ total+=i.preco*i.qtd; container.innerHTML+=`<div>${i.nome} x${i.qtd} = R$ ${(i.preco*i.qtd).toFixed(2)}</div>`; }); } document.getElementById('totalCarrinho').textContent=total.toFixed(2); document.getElementById('modalCarrinho').style.display='flex'; };
    window.fecharCarrinho = () => { document.getElementById('modalCarrinho').style.display='none'; };
    window.finalizarPedido = async () => {
        if(carrinho.length===0) return;
        const total = carrinho.reduce((a,i)=>a+(i.preco*i.qtd),0);
        const formaPagamento = document.getElementById('formaPagamento').value;
        let mensagem = `🍔 *NOVO PEDIDO - ${dadosRestaurante.nome}*%0a%0a`;
        carrinho.forEach(i=>{ mensagem += `• ${i.nome} x${i.qtd} = R$ ${(i.preco*i.qtd).toFixed(2)}%0a`; });
        mensagem += `%0a💰 Total: R$ ${total.toFixed(2)}%0a💳 Pagamento: ${formaPagamento}%0a%0a📲 Pedido via Cardápio Digital`;
        await addDoc(collection(db,"pedidos"),{ restauranteId: restauranteEmail, restauranteNome: dadosRestaurante.nome, itens: carrinho, total: total, formaPagamento: formaPagamento, status: "novo", createdAt: new Date().toISOString() });
        window.open(`https://wa.me/${dadosRestaurante.whatsapp?.replace(/\D/g,'')}?text=${mensagem}`, "_blank");
        carrinho=[]; atualizarCarrinho(); fecharCarrinho();
    };
    carregarDados();
    window.adicionarAoCarrinho = window.adicionarAoCarrinho;
</script>
</body>
</html>
