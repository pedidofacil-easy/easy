<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - PedidoFácil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .login-box {
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 64px;
        }
        .logo h1 {
            font-size: 28px;
            margin-top: 12px;
            color: #1a1a2e;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e67e22;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230,126,34,0.3);
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">👑</div>
                <h1>PedidoFácil</h1>
                <p>Painel Administrativo</p>
            </div>
            <form id="adminLogin">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email do administrador" required>
                </div>
                <div class="form-group">
                    <input type="password" id="senha" placeholder="Senha" required>
                </div>
                <button type="submit">Entrar no sistema →</button>
            </form>
            <div id="error" class="error">❌ Email ou senha incorretos!</div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "admin@pedidofacil.com";
        const ADMIN_SENHA = "247126Ca";
        
        document.getElementById('adminLogin').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            if (email === ADMIN_EMAIL && senha === ADMIN_SENHA) {
                localStorage.setItem('adminLogado', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
